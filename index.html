<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPT-Dawn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="alternate" type="text/markdown" href="/index.md">
    <link rel="agent-card" type="application/json" href="/.well-known/agent-card.json">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-0: #03050d;
            --bg-1: #070b17;
            --bg-2: #0b1020;
            --text: #dbe4ff;
            --muted: #8292bf;
            --cyan: #73daca;
            --violet: #bb9af7;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text);
            font-family: "Inter", sans-serif;
            background:
                radial-gradient(85% 70% at 12% 10%, rgba(122, 162, 247, 0.2), transparent 62%),
                radial-gradient(70% 60% at 86% 12%, rgba(187, 154, 247, 0.18), transparent 64%),
                linear-gradient(160deg, var(--bg-0), var(--bg-1) 55%, var(--bg-2));
            display: grid;
            place-items: center;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: radial-gradient(rgba(255, 255, 255, 0.35) 0.45px, transparent 0.45px);
            background-size: 2px 2px;
            opacity: 0.13;
            z-index: -2;
        }

        .aurora {
            position: fixed;
            inset: -30vh -20vw;
            pointer-events: none;
            z-index: -1;
            filter: blur(60px);
            opacity: 0.65;
            background:
                radial-gradient(circle at 20% 22%, rgba(115, 218, 202, 0.34), transparent 38%),
                radial-gradient(circle at 72% 30%, rgba(122, 162, 247, 0.3), transparent 42%),
                radial-gradient(circle at 58% 80%, rgba(187, 154, 247, 0.28), transparent 38%);
            animation: auroraShift 15s ease-in-out infinite alternate;
            transform-origin: center;
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 999px;
            background: rgba(219, 228, 255, 0.7);
            left: var(--x);
            top: var(--y);
            opacity: 0;
            animation: particleFloat var(--dur) linear infinite;
            animation-delay: var(--delay);
        }

        .cursor-glow {
            position: fixed;
            left: 0;
            top: 0;
            width: 300px;
            height: 300px;
            transform: translate(-50%, -50%);
            border-radius: 999px;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(circle, rgba(115, 218, 202, 0.14), rgba(115, 218, 202, 0.04) 42%, rgba(0, 0, 0, 0) 68%);
            filter: blur(3px);
        }

        .stage {
            width: min(980px, 92vw);
            padding: clamp(1rem, 3vw, 2rem);
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .eyes {
            display: inline-flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.45rem 0;
        }

        .eye {
            width: clamp(54px, 9vw, 76px);
            height: clamp(34px, 6vw, 46px);
            border-radius: 999px;
            border: 1px solid rgba(122, 162, 247, 0.48);
            background:
                radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0) 55%),
                linear-gradient(150deg, rgba(18, 26, 47, 0.94), rgba(10, 16, 32, 0.86));
            position: relative;
            overflow: hidden;
            display: grid;
            place-items: center;
            box-shadow: inset 0 1px 9px rgba(255, 255, 255, 0.08), 0 0 28px rgba(122, 162, 247, 0.2);
            animation: blink 5.2s infinite;
        }

        .eye::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2), transparent 50%);
        }

        .pupil {
            width: clamp(16px, 2vw, 18px);
            height: clamp(16px, 2vw, 18px);
            border-radius: 999px;
            background: radial-gradient(circle at 30% 30%, #e8fdff 0%, #9befff 30%, #6bd8f1 58%, #101a33 100%);
            box-shadow: 0 0 18px rgba(115, 218, 202, 0.65), inset -3px -3px 8px rgba(7, 12, 22, 0.62);
            position: absolute;
            transform: translate(0, 0);
            will-change: transform;
        }

        .title {
            margin: clamp(0.8rem, 2vw, 1.3rem) 0 0;
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(2.6rem, 10vw, 6.5rem);
            line-height: 0.92;
            letter-spacing: -0.06em;
            font-weight: 700;
            text-wrap: balance;
            background: linear-gradient(125deg, #f2f6ff 0%, #cfe8ff 30%, #a7c8ff 55%, #d7c9ff 85%, #f2f6ff 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: titleSweep 8s ease-in-out infinite;
        }

        .links {
            margin-top: clamp(1.3rem, 3vw, 2.2rem);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.85rem 1.25rem;
        }

        .link {
            --mx: 0px;
            --my: 0px;
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--text);
            padding: 0.15rem 0;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-size: clamp(0.85rem, 1.8vw, 0.96rem);
            transform: translate3d(var(--mx), var(--my), 0);
            transition: transform 180ms ease, color 220ms ease, text-shadow 220ms ease;
            position: relative;
        }

        .link::before {
            content: "";
            position: absolute;
            left: 0;
            bottom: -0.08rem;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, rgba(115, 218, 202, 0), rgba(115, 218, 202, 0.95), rgba(187, 154, 247, 0.95), rgba(187, 154, 247, 0));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 280ms cubic-bezier(0.16, 1, 0.3, 1);
        }

        .link:hover,
        .link:focus-visible {
            color: #eff7ff;
            text-shadow: 0 0 18px rgba(115, 218, 202, 0.5);
            outline: none;
        }

        .link:hover::before,
        .link:focus-visible::before {
            transform: scaleX(1);
        }

        .arrow {
            color: var(--muted);
            margin-left: 0.45rem;
            transition: transform 180ms ease, color 180ms ease, opacity 180ms ease;
            opacity: 0.7;
        }

        .link:hover .arrow,
        .link:focus-visible .arrow {
            transform: translateX(3px) translateY(-2px);
            color: var(--cyan);
            opacity: 1;
        }

        .reveal {
            opacity: 0;
            transform: translateY(22px);
            transition: transform 620ms cubic-bezier(0.16, 1, 0.3, 1), opacity 620ms ease;
        }

        .delay-1 {
            transition-delay: 120ms;
        }

        .delay-2 {
            transition-delay: 200ms;
        }

        body.loaded .reveal {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes auroraShift {
            0% {
                transform: translate3d(0, 0, 0) scale(1);
            }

            50% {
                transform: translate3d(2vw, -3vh, 0) scale(1.06);
            }

            100% {
                transform: translate3d(-2vw, 4vh, 0) scale(1.02);
            }
        }

        @keyframes particleFloat {
            0% {
                transform: translate3d(0, 0, 0) scale(0.8);
                opacity: 0;
            }

            20% {
                opacity: 0.5;
            }

            80% {
                opacity: 0.7;
            }

            100% {
                transform: translate3d(0, -18vh, 0) scale(1.45);
                opacity: 0;
            }
        }

        @keyframes titleSweep {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes blink {

            0%,
            90%,
            100% {
                transform: scaleY(1);
            }

            95% {
                transform: scaleY(0.12);
            }
        }

        @media (max-width: 700px) {
            .stage {
                align-items: center;
                text-align: center;
            }

            .cursor-glow {
                width: 210px;
                height: 210px;
            }

            .links {
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="aurora" aria-hidden="true"></div>
    <div class="particles" id="particles" aria-hidden="true"></div>
    <div class="cursor-glow" id="cursor-glow" aria-hidden="true"></div>

    <main class="stage">
        <div class="eyes reveal" aria-label="Interactive eyes">
            <div class="eye" data-eye>
                <div class="pupil"></div>
            </div>
            <div class="eye" data-eye>
                <div class="pupil"></div>
            </div>
        </div>

        <h1 class="title reveal delay-1">CPT-Dawn</h1>

        <nav class="links reveal delay-2" aria-label="Direct links">
            <a class="link" href="https://github.com/CPT-Dawn" target="_blank" rel="noopener noreferrer">
                <span>GitHub</span>
                <span class="arrow">↗</span>
            </a>
            <a class="link" href="https://x.com/CPT_Dawn" target="_blank" rel="noopener noreferrer">
                <span>X</span>
                <span class="arrow">↗</span>
            </a>
            <a class="link" href="https://www.linkedin.com/in/cptdawn/" target="_blank" rel="noopener noreferrer">
                <span>LinkedIn</span>
                <span class="arrow">↗</span>
            </a>
            <a class="link" href="https://github.com/CPT-Dawn/Resume" target="_blank" rel="noopener noreferrer">
                <span>Resume</span>
                <span class="arrow">↗</span>
            </a>
        </nav>
    </main>

    <script>
        if (navigator.modelContext && navigator.modelContext.provideContext) {
            navigator.modelContext.provideContext({
                tools: [
                    {
                        name: "getLinks",
                        description: "Get the social and professional links for CPT-Dawn",
                        inputSchema: {
                            type: "object",
                            properties: {}
                        },
                        execute: async () => {
                            return {
                                result: "GitHub: https://github.com/CPT-Dawn, X: https://x.com/CPT_Dawn, LinkedIn: https://www.linkedin.com/in/cptdawn/, Resume: https://github.com/CPT-Dawn/Resume"
                            };
                        }
                    }
                ]
            });
        }

        const cursorGlow = document.getElementById("cursor-glow");
        const particlesRoot = document.getElementById("particles");
        const eyes = Array.from(document.querySelectorAll("[data-eye]")).map((eye) => {
            const pupil = eye.querySelector(".pupil");
            return { eye, pupil, currentX: 0, currentY: 0, targetX: 0, targetY: 0 };
        });

        const links = document.querySelectorAll(".link");
        const pointer = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

        function seedParticles() {
            if (!particlesRoot) {
                return;
            }

            const count = 26;
            for (let i = 0; i < count; i += 1) {
                const particle = document.createElement("span");
                particle.className = "particle";
                particle.style.setProperty("--x", `${Math.random() * 100}%`);
                particle.style.setProperty("--y", `${55 + Math.random() * 45}%`);
                particle.style.setProperty("--dur", `${8 + Math.random() * 11}s`);
                particle.style.setProperty("--delay", `${Math.random() * 10}s`);
                particlesRoot.appendChild(particle);
            }
        }

        function setEyeTargets(x, y) {
            eyes.forEach((item) => {
                const rect = item.eye.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;
                const dx = x - eyeX;
                const dy = y - eyeY;
                const angle = Math.atan2(dy, dx);
                const distance = Math.min(rect.width * 0.22, Math.hypot(dx, dy) * 0.08);

                item.targetX = Math.cos(angle) * distance;
                item.targetY = Math.sin(angle) * distance;
            });
        }

        function animateEyes() {
            eyes.forEach((item) => {
                item.currentX += (item.targetX - item.currentX) * 0.15;
                item.currentY += (item.targetY - item.currentY) * 0.15;
                item.pupil.style.transform = `translate(${item.currentX}px, ${item.currentY}px)`;
            });
            requestAnimationFrame(animateEyes);
        }

        function onPointerMove(x, y) {
            pointer.x = x;
            pointer.y = y;
            cursorGlow.style.left = `${x}px`;
            cursorGlow.style.top = `${y}px`;
            setEyeTargets(x, y);
        }

        document.addEventListener("mousemove", (event) => {
            onPointerMove(event.clientX, event.clientY);
        });

        document.addEventListener("touchmove", (event) => {
            const touch = event.touches[0];
            if (!touch) {
                return;
            }
            onPointerMove(touch.clientX, touch.clientY);
        }, { passive: true });

        links.forEach((link) => {
            link.addEventListener("mousemove", (event) => {
                const rect = link.getBoundingClientRect();
                const relX = event.clientX - rect.left;
                const relY = event.clientY - rect.top;
                const cx = rect.width / 2;
                const cy = rect.height / 2;

                link.style.setProperty("--mx", `${(relX - cx) * 0.11}px`);
                link.style.setProperty("--my", `${(relY - cy) * 0.15}px`);
            });

            link.addEventListener("mouseleave", () => {
                link.style.setProperty("--mx", "0px");
                link.style.setProperty("--my", "0px");
            });
        });

        window.addEventListener("resize", () => {
            setEyeTargets(pointer.x, pointer.y);
        });

        window.addEventListener("load", () => {
            document.body.classList.add("loaded");
            seedParticles();
            setEyeTargets(pointer.x, pointer.y);
            animateEyes();
        });
    </script>
</body>

</html>
